<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1A6B4A"/>
  <!-- Court lines (subtle texture) -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <rect x="240" y="157.5" width="720" height="315" rx="0" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <!-- Court mark (logo) -->
  <rect x="80" y="148" width="248" height="32" rx="16" fill="white" opacity="1.0"/>
  <rect x="80" y="198" width="168" height="32" rx="16" fill="white" opacity="0.72"/>
  <rect x="80" y="248" width="200" height="32" rx="16" fill="white" opacity="0.50"/>
  <circle cx="300" cy="264" r="28" fill="#F0A500"/>
  <!-- Brand name -->
  <text x="80" y="386" font-family="-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif" font-weight="800" font-size="68" fill="white" letter-spacing="-1.5">MyTournament<tspan fill="#F0A500">.PB</tspan></text>
  <!-- Tagline -->
  <text x="80" y="448" font-family="-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif" font-size="30" fill="rgba(255,255,255,0.72)">Every tournament. One place.</text>
  <!-- Sub-label -->
  <text x="80" y="500" font-family="-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif" font-size="22" fill="rgba(255,255,255,0.42)" letter-spacing="0.04em">MALAYSIA · PICKLEBALL</text>
</svg>
