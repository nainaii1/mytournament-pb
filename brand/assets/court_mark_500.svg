<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Full bleed green background — no padding, fills entire 500x500 -->
  <!-- Instagram crops to circle so corners don't matter, but we keep rx for square use -->
  <rect x="0" y="0" width="500" height="500" rx="0" ry="0" fill="#1A6B4A"/>

  <!-- Line 1: Top — longest, 100% opacity -->
  <line x1="80" y1="175" x2="390" y2="175" stroke="white" stroke-width="36" stroke-linecap="round" opacity="1.0"/>

  <!-- Line 2: Middle — shorter, 72% opacity -->
  <line x1="80" y1="268" x2="290" y2="268" stroke="white" stroke-width="36" stroke-linecap="round" opacity="0.72"/>

  <!-- Line 3: Bottom — medium, 50% opacity -->
  <line x1="80" y1="362" x2="330" y2="362" stroke="white" stroke-width="36" stroke-linecap="round" opacity="0.50"/>

  <!-- Amber ball — sits at end of bottom line, touches it naturally -->
  <circle cx="400" cy="362" r="52" fill="#F0A500"/>
</svg>
